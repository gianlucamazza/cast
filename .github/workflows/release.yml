name: Release

# Sign the extension and attach the signed XPI to the GitHub release.
# Defaults to the unlisted (self-distribution) channel, which signs immediately
# and needs no prior AMO listing. To publish on AMO instead, run with
# channel=listed (requires the listing and amo-metadata.json).
#
# Requires repo secrets: AMO_JWT_ISSUER, AMO_JWT_SECRET.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      channel:
        description: AMO channel
        type: choice
        options: [unlisted, listed]
        default: unlisted

permissions:
  contents: write

jobs:
  sign:
    name: Sign & release
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ github.event.inputs.channel || 'unlisted' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Check AMO secrets
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          [[ -n "$AMO_JWT_ISSUER" && -n "$AMO_JWT_SECRET" ]] || {
            echo "::error::AMO_JWT_ISSUER / AMO_JWT_SECRET repo secrets are not set"
            exit 1
          }

      # The sign cmd takes a built zip, not a source dir: build first.
      - name: web-ext build
        id: build
        uses: kewisch/action-web-ext@84a13bb9e1b6108c43788ba091c41ca1dba6ad45 # v2
        with:
          cmd: build
          source: ./extension

      - name: web-ext sign
        id: signing
        uses: kewisch/action-web-ext@84a13bb9e1b6108c43788ba091c41ca1dba6ad45 # v2
        with:
          cmd: sign
          source: ${{ steps.build.outputs.target }}
          channel: ${{ env.CHANNEL }}
          apiKey: ${{ secrets.AMO_JWT_ISSUER }}
          apiSecret: ${{ secrets.AMO_JWT_SECRET }}
          # amo-metadata is only consumed for the listed channel.
          metaDataFile: ${{ env.CHANNEL == 'listed' && 'amo-metadata.json' || '' }}

      - name: Attach signed XPI to the release
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.target
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: ${{ steps.signing.outputs.target }}
